<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>operatoren</title>
</head>
<body>
<script>
    "use strict";

    let a = 5;
    let b = "5";

    console.log("Add:", a + 2);
    console.log("Sub:", a - 2);
    console.log("Mul:", a * 2);
    console.log("Div:", a / 2);
    console.log("Modulo:", a % 2);

    console.log("Vergleich mit ==:", a == b);
    console.log("Vergleich mit ===:", a === b);

</script>

</body>
</html>
