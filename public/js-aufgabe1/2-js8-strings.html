<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    "use strict";

    let str = "ANA are Mere";
    console.log("lungime: ", str.length);
    console.log("indexOf: ", str.indexOf("are"));
    console.log("lastIndexOf: ", str.lastIndexOf("are"));
    console.log("substring: ", str.substring(2, 7));
    console.log("replace: ", str.replace(str, "ana are pere"));
    console.log("trim: ", str.trim());
    console.log("concat: ", str.concat("ana are pere"));
    console.log("to lower case: ", str.toLowerCase());
    console.log("to upper case: ", str.toUpperCase());
</script>
