<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>array</title>
</head>
<body>
<script>
    "use strict"

    let arr = ["erstes", "zweites", 4, 3];
    //schleife cu for
    for (let i = 0; i < arr.length; i++) {
        console.log(i + "=>" + arr[i]);
    }

    //schleife cu foreach
    arr.forEach(function(value, index){
        console.log(index + "=>" + value);
    });

    //schleife cu for...it
    let i = 0;
    for(const el of arr){
        console.log(i++, ' => ', el);
    }

    //adaugam element
    arr.push(4);
    console.log(arr);
    arr.push("hey");
    console.log(arr);
    arr.push(112);
    console.log(arr);

    arr.pop();
    console.log(arr);

    arr[1] = 2;
    console.log(arr);

    console.log(arr.length); //ne da lungimea lui arr
    let d = arr.sort(function(a, b) {
        return a - b;
    });
    console.log(d);

    let e = arr.find(e => e === 3);
    console.log(e);

    let a = arr.filter(function(e) {
        return e >= 4;
    });
    console.log(a);

    let b = arr.map(function(e) {
        return e + 2;
    })
    console.log(b);

    let c = arr.slice(1, 3);
    console.log(c)

</script>

</body>
</html>
