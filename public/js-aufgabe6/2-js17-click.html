<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Click</title>
</head>
<body>

<div id="box" style="width:200px; height:100px; background-color:red;">
    Farbe
</div>

<button id="button">Farbe wechseln</button>

<script>
    "use strict";

    let colors = ["red", "yellow", "green"];
    let index = 0;

    document.getElementById("button").addEventListener("click", function() {
        index = index + 1;

        if (index >= colors.length) {
            index = 0;
        }

        document.getElementById("box").style.backgroundColor = colors[index];
    });

</script>

</body>
</html>
