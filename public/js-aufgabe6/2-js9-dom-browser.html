<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOM Browser</title>
</head>
<body>
<script>
    "use strict";

    let userAgent = navigator.userAgent;
    let browser;

    if(userAgent.includes("Firefox")) {
        browser = "Firefox";
    }
    else if(userAgent.includes("Chrome")) {
        browser = "Chrome";
    }
    else if(userAgent.includes("Safari")) {
        browser = "Safari";
    }

    console.log("Current browser: ", browser)
</script>

</body>
</html>
