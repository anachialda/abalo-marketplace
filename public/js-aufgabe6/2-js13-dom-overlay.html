<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>dom overlay</title>

    <style>
        #overlay {
            position: absolute;
            bottom: 0px;
            width: 100%;
            height: 50px;
            background-color: #df8fe8;
            border: 10px solid #9c03b4;
        }
    </style>
</head>
<body>

<p> Continutul paginii </p>

<div id="overlay">
    Overlay in marginea de jos.
</div>

<!--position: absolute bedeutet, dass das Element absolut zur Seite positioniert wird.-->
<!--bottom: 0px bedeutet, dass das Element unten am Rand liegt.-->
<!--width bestimmt die Breite, height bestimmt die Höhe.-->

</body>
</html>
