<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Class</title>
</head>
<body>

<script>
    "use strict";

    class User {
        constructor(firstname, lastname) {
            this._firstname = firstname;
            this._lastname = lastname;
        }

        get firstname() {
            return this._firstname;
        }

        set firstname(value) {
            this._firstname = value;
        }

        get lastname() {
            return this._lastname;
        }

        set lastname(value) {
            this._lastname = value;
        }
    }

    class Buyer extends User {
        constructor(firstname, lastname, lastBuy) {
            super(firstname, lastname);
            this._lastBuy = lastBuy;
        }

        get lastBuy() {
            return this._lastBuy;
        }

        set lastBuy(value) {
            this._lastBuy = value;
        }
    }

    let user = new User("Ana", "Chialda");
    let buyer = new Buyer("Iarina", "Toma", "Laptop");

    console.log(user);
    console.log(buyer);
    console.info("User:", user.firstname, user.lastname);
    console.info("Buyer:", buyer.firstname, buyer.lastname, buyer.lastBuy);

</script>


</body>
</html>
