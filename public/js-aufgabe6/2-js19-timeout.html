<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Timeout</title>
</head>
<body>

<div id="box" style="width:250px; height:120px; border:1px solid black;">
    se schimba culoarea la fiecare secunda
</div>

<script>
    "use strict";

    let box = document.getElementById("box");
    let red = false;

    setInterval(function() {
        if (red) {
            box.style.backgroundColor = "white";
        } else {
            box.style.backgroundColor = "red";
        }

        red = !red;
    }, 1000);

</script>

</body>
</html>
