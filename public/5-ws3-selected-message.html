<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WS3 - Selected Message</title>
</head>
<body>
<h1>WebSocket Selected Message Test</h1>
<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<script>
    // Kennungsid constanta in clientside JavaScript
    const MY_ID = 42;

    var pusher = new Pusher('o0moyvc1ek5cdve622f9', {
        wsHost: '127.0.0.1',
        wsPort: 8080,
        forceTLS: false,
        enabledTransports: ['ws'],
        cluster: 'mt1'
    });

    var channel = pusher.subscribe('test-channel');

    channel.bind('selected-event', function(data) {
        // Afiseaza mesajul doar daca Kennungsid se potriveste
        if (data.kennungsid === MY_ID) {
            console.log('Message received: ' + data.message);
        } else {
            console.log('Message ignored - different ID: ' + data.kennungsid);
        }
    });
</script>
</body>
</html>
