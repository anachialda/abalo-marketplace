<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>AJAX Periodic</title>
</head>
<body>

<h1>AJAX Periodic Beispiel</h1>
<p id="nachricht">Lade...</p>

<script>
    // functie ca sa putem apela la fiecare 3 sec
    function ladeNachricht() {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", "message.json");

        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    var daten = JSON.parse(xhr.responseText);
                    document.getElementById("nachricht").innerText = daten.message;
                } else {
                    console.error(xhr.statusText);
                }
            }
        };

        xhr.send();
    }

    ladeNachricht();

    window.setInterval(ladeNachricht, 3000);
</script>

</body>
</html>
